<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neovia – Programação Usina</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--vm:#CC0000;--vm2:#AA0000;--bg:#111;--card:#1A1A1A;--card2:#222;--borda:#333;--branco:#F0F0F0;--muted:#888;--verde:#22C55E;--azul:#3B82F6;--amarelo:#F5A623;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--branco);font-family:'Barlow',sans-serif;font-size:13px;min-height:100vh;}

header{background:#000;border-bottom:3px solid var(--vm);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:50;}
.logo-wrap{display:flex;align-items:center;gap:12px;}
.logo-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--vm);letter-spacing:-1px;}
.logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:-2px;font-family:'Barlow Condensed',sans-serif;}
.logo-divider{width:1px;height:28px;background:var(--borda);}
.logo-eng{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.badge-usina{background:transparent;border:1px solid var(--vm);color:var(--vm);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;padding:3px 12px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;}

.nav-data{background:#0A0A0A;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;padding:8px 18px;gap:10px;flex-wrap:wrap;}
.nav-esq{display:flex;align-items:center;gap:8px;}
.btn-nav{background:var(--card2);border:1px solid var(--borda);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;transition:.15s;}
.btn-nav:hover,.btn-nav.hoje{border-color:var(--vm);color:#fff;}
.data-display{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--vm);text-align:center;min-width:160px;}
.data-display span{display:block;font-size:10px;color:var(--muted);font-weight:400;text-transform:uppercase;letter-spacing:0.5px;}
.btn-acao{background:var(--card2);border:1px solid var(--borda);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;transition:.15s;white-space:nowrap;}
.btn-acao:hover{border-color:var(--vm);color:#fff;}

.conteudo{padding:14px 18px;max-width:1400px;margin:0 auto;}

/* BANNER */
.pub-banner{display:flex;align-items:center;gap:8px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:4px;padding:7px 12px;margin-bottom:10px;font-size:11px;color:var(--verde);}
.dot-pub{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* CABEÇALHO PROGRAMAÇÃO */
.prog-head{background:var(--card);border:1px solid var(--borda);border-top:3px solid var(--vm);border-radius:4px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.prog-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;text-transform:uppercase;color:var(--vm);letter-spacing:1px;}
.prog-meta{display:flex;gap:22px;flex-wrap:wrap;align-items:center;}
.mi{text-align:center;}
.mi .mv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;}
.mi .mv.vm{color:var(--vm);}
.mi .ml{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
.card{background:var(--card);border:1px solid var(--borda);border-radius:4px;padding:12px;text-align:center;}
.card.vm{border-top:3px solid var(--vm);}
.card.az{border-top:3px solid var(--azul);}
.card.vd{border-top:3px solid var(--verde);}
.card.am{border-top:3px solid var(--amarelo);}
.card .cv{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;}
.card .cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

/* TABELA USINA */
.tw{background:var(--card);border:1px solid var(--borda);border-radius:4px;overflow:hidden;margin-bottom:12px;}
table.tu{width:100%;border-collapse:collapse;font-size:13px;}
table.tu th{background:#000;padding:9px 12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--borda);white-space:nowrap;}
table.tu td{padding:14px 12px;border-bottom:1px solid var(--borda);text-align:center;vertical-align:middle;}
table.tu tr:last-child td{border-bottom:none;}
table.tu tr.tr-total td{background:rgba(204,0,0,0.08);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;border-top:2px solid var(--vm);}

/* CÉLULAS COLORIDAS (fiel ao Excel original) */
td.c-seq{background:rgba(232,160,32,0.18);color:#F5A623;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;}
td.c-car{background:rgba(107,163,212,0.18);color:#93C5FD;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;}
td.c-pes{background:rgba(212,132,90,0.18);color:#FCA989;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;}
td.c-tot{background:rgba(212,168,32,0.18);color:#F5A623;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;}
td.c-cam{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;}
td.c-usi{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
td.c-eq{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;}
td.c-info{text-align:left;font-size:12px;max-width:260px;line-height:1.4;}
td.c-info.aguardando{color:var(--vm);font-weight:600;font-style:italic;}

/* STATUS */
.st-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.st-sel{background:var(--card2);border:1px solid var(--borda);color:var(--branco);padding:5px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-transform:uppercase;width:100%;max-width:120px;}
.st-sel.pendente{border-color:#555;color:var(--muted);}
.st-sel.usinando{border-color:var(--amarelo);color:var(--amarelo);}
.st-sel.concluido{border-color:var(--verde);color:var(--verde);}
.dot-st{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-p{background:var(--muted);}
.dot-u{background:var(--amarelo);animation:pulse 1.5s infinite;}
.dot-c{background:var(--verde);}

/* CONTADOR CARGAS */
.ct-wrap{display:flex;align-items:center;gap:4px;justify-content:center;}
.ct-btn{background:var(--card2);border:1px solid var(--borda);color:var(--branco);width:22px;height:22px;border-radius:3px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1;}
.ct-btn:hover{border-color:var(--vm);color:var(--vm);}
.ct-val{font-family:'Barlow Condensed',sans-serif;font-size:12px;min-width:50px;text-align:center;color:var(--muted);}

/* BARRA PROGRESSO */
.prog-bar-wrap{margin-top:5px;}
.prog-bar-lbl{font-size:10px;color:var(--muted);margin-bottom:2px;display:flex;justify-content:space-between;}
.prog-bar{background:rgba(255,255,255,0.06);border-radius:3px;height:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--vm);transition:width .4s;}

/* TEMPO */
.tempo-wrap{background:var(--card);border:1px solid var(--borda);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.tempo-head{background:#000;padding:9px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:0.5px;border-bottom:1px solid var(--borda);}
.tempo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
.ti{padding:12px 14px;border-right:1px solid var(--borda);border-bottom:1px solid var(--borda);}
.ti:last-child{border-right:none;}
.ti .tl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.ti .tv{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;margin-top:3px;}
.ti .tv.vm{color:var(--vm);}
.ti .tv.vd{color:var(--verde);}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--branco);margin-bottom:8px;}

/* PRINT */
@media print{
  header,.nav-data,.btn-acao,.btn-nav,.st-wrap,.cards,.pub-banner{display:none!important;}
  body{background:#fff;color:#000;}
  .conteudo{padding:0;}
  .print-cab{display:flex!important;}
  .prog-head{background:#CC0000!important;border-radius:0;-webkit-print-color-adjust:exact;}
  .prog-titulo,.mi .mv{color:#fff!important;}
  .mi .ml{color:rgba(255,255,255,0.7)!important;}
  .tw,.tempo-wrap{border:1px solid #ccc;border-radius:0;}
  table.tu th{background:#e0e0e0!important;color:#333!important;-webkit-print-color-adjust:exact;}
  td.c-seq{background:#FDE68A!important;color:#92400E!important;-webkit-print-color-adjust:exact;}
  td.c-car{background:#BFDBFE!important;color:#1E40AF!important;-webkit-print-color-adjust:exact;}
  td.c-pes{background:#FED7AA!important;color:#92400E!important;-webkit-print-color-adjust:exact;}
  td.c-tot{background:#FDE68A!important;color:#78350F!important;-webkit-print-color-adjust:exact;}
  td.c-info.aguardando{color:#CC0000!important;}
  tr.tr-total td{background:#FFEEEE!important;-webkit-print-color-adjust:exact;}
  .tempo-wrap{border:1px solid #ccc;}
  table.tu{font-size:11px;}
  td,th{padding:7px 10px;}
}
.print-cab{display:none;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:2px solid #CC0000;margin-bottom:14px;}
.print-cab .pc-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:#CC0000;letter-spacing:-1px;}
.print-cab .pc-logo span{font-size:10px;font-weight:400;color:#555;display:block;letter-spacing:1px;text-transform:uppercase;}
.print-cab .pc-info{text-align:right;font-size:11px;color:#555;}
.print-cab .pc-info b{display:block;color:#CC0000;font-size:15px;font-family:'Barlow Condensed',sans-serif;font-weight:800;}

@media(max-width:700px){
  table.tu td,table.tu th{padding:9px 8px;}
  td.c-seq{font-size:18px;}
  td.c-tot{font-size:13px;}
  .tempo-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div>
      <div class="logo-n">NEOVIA</div>
      <div class="logo-sub">Engenharia</div>
    </div>
    <div class="logo-divider"></div>
    <div class="logo-eng">Equipe da Usina</div>
  </div>
  <span class="badge-usina">🏭 Usina</span>
</header>

<div class="nav-data">
  <div class="nav-esq">
    <button class="btn-nav" onclick="navData(-1)">◀</button>
    <div class="data-display" id="dataDisplay"><span>Noite</span>–</div>
    <button class="btn-nav" onclick="navData(+1)">▶</button>
    <button class="btn-nav hoje" onclick="irHoje()">Hoje</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="btn-acao" onclick="window.print()">🖨 Imprimir / PDF</button>
    <button class="btn-acao" onclick="location.reload()">🔄 Atualizar</button>
  </div>
</div>

<div class="conteudo">
  <div class="print-cab">
    <div class="pc-logo">NEOVIA<span>Engenharia</span></div>
    <div class="pc-info">Programação da Usina<b id="printNoite">–</b></div>
  </div>

  <div id="bannerPub" class="pub-banner" style="display:none">
    <div class="dot-pub"></div>
    <span id="bannerTxt"></span>
  </div>

  <div id="conteudo">
    <div class="empty"><div class="ei">🏭</div><h2>Carregando...</h2></div>
  </div>
</div>

<script>
let dataAtual = hoje();
let SHEETS_URL = localStorage.getItem('nv3_url') || '';

async function buscarDoSheets(dataI){
  if(!SHEETS_URL) return null;
  try{
    const r = await fetch(SHEETS_URL+'?action=buscar&dataI='+dataI);
    const d = await r.json();
    return d.ok ? d.data : null;
  } catch(e){ return null; }
}

irHoje();

function hoje(){const now=new Date(),d=new Date();if(now.getHours()<12)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function navData(delta){const d=new Date(dataAtual+'T12:00:00');d.setDate(d.getDate()+delta);dataAtual=d.toISOString().slice(0,10);renderProg();}
function irHoje(){dataAtual=hoje();renderProg();}
function fmtD(d){if(!d)return'–';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}

async function renderProg(){
  const d2=new Date(dataAtual+'T12:00:00');d2.setDate(d2.getDate()+1);
  const dataF=d2.toISOString().slice(0,10);
  const noiteLabel=fmtD(dataAtual)+' → '+fmtD(dataF);
  document.getElementById('dataDisplay').innerHTML='<span>Noite</span>'+noiteLabel;
  document.getElementById('printNoite').textContent=noiteLabel;

  let dadosStr=localStorage.getItem('nv3_prog_'+dataAtual)||localStorage.getItem('nv2_prog_'+dataAtual)||localStorage.getItem('nv_prog_'+dataAtual);
  
  if(!dadosStr && SHEETS_URL){
    document.getElementById('conteudo').innerHTML='<div class="empty"><div class="ei">🔄</div><h2>Buscando programação...</h2></div>';
    const prog = await buscarDoSheets(dataAtual);
    if(prog){
      dadosStr = JSON.stringify(prog);
      localStorage.setItem('nv3_prog_'+dataAtual, dadosStr);
    }
  }

  if(!dadosStr){
    document.getElementById('bannerPub').style.display='none';
    document.getElementById('conteudo').innerHTML='<div class="empty"><div class="ei">🌙</div><h2>Sem programação para esta noite</h2><p>Aguarde o gestor publicar.</p></div>';
    return;
  }

  const prog=JSON.parse(dadosStr);

  if(prog.liberarEm){
    const agora=new Date(),lib=new Date(prog.liberarEm);
    if(agora<lib){
      const diff=lib-agora,hF=Math.floor(diff/3600000),mF=Math.floor((diff%3600000)/60000);
      document.getElementById('bannerPub').style.display='none';
      document.getElementById('conteudo').innerHTML='<div class="empty"><div class="ei">⏳</div><h2>Programação em breve</h2><p>Disponível às <b style="color:var(--vm)">'+new Date(prog.liberarEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</b></p><p style="margin-top:6px;font-size:11px">Faltam '+hF+'h '+mF+'min</p></div>';
      setTimeout(()=>renderProg(),diff+1000);
      return;
    }
  }

  const pub=new Date(prog.publicadoEm);
  document.getElementById('bannerPub').style.display='flex';
  document.getElementById('bannerTxt').textContent='Publicado às '+pub.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' de '+pub.toLocaleDateString('pt-BR');

  const itens=prog.itens||[];
  const cfgG=JSON.parse(localStorage.getItem('nv3_cfg')||localStorage.getItem('nv2_cfg')||localStorage.getItem('nv_cfg')||'null')||{FF:2.313,CD:2.286,LSAM:2.374,GAP:2.302,FF1:2.439,BV:2.313,mm16:2.313,mm25:2.313,FR6:2.350,OUT:2.313,bvT:4,bvC:'Térmico Pequeno',bvR:'Gilberto'};
  const usinaCfg=JSON.parse(localStorage.getItem('nv3_usina_'+dataAtual)||localStorage.getItem('nv2_usina_'+dataAtual)||localStorage.getItem('nv_usina_'+dataAtual)||'null')||{prod:100,tonCarga:20,fator:1.025,horaInicio:'18:30',encarregado:'Tarciso'};

  // Agrupar por solução
  const grupos={};
  itens.forEach(it=>{
    const k=it.solucao||'Outros';
    if(!grupos[k])grupos[k]={sol:k,ton:0,trechos:[]};
    grupos[k].ton+=it.peso;
    grupos[k].trechos.push(`${it.sentido} km ${n3(it.kpi)}→${n3(it.kpf)} f${it.faixa}`);
  });

  const massas=[];
  let seq=1;
  Object.values(grupos).forEach(g=>{
    const isBV=g.sol.toUpperCase()==='BV';
    const tonU=isBV?cfgG.bvT:g.ton*usinaCfg.fator;
    const cargas=isBV?1:Math.ceil(tonU/usinaCfg.tonCarga);
    const tonC=cargas>0?tonU/cargas:0;
    const info=isBV?'Aguardando confirmação':(g.trechos.length>3?`${g.trechos.length} trechos – Fecha n.${[...new Set(itens.filter(i=>(i.solucao||'Outros')===g.sol).map(i=>i.inted||'1'))].join('/')}`:g.trechos.join(' | '));
    massas.push({seq:seq++,cam:isBV?cfgG.bvC:'Basculante',usin:mapSol(g.sol),cargas,tonC:parseFloat(tonC.toFixed(2)),tonTotal:parseFloat(tonU.toFixed(2)),equipe:isBV?cfgG.bvR:usinaCfg.encarregado,info,isBV,solKey:g.sol});
  });
  if(!massas.find(m=>m.isBV)) massas.push({seq:massas.length+1,cam:cfgG.bvC,usin:'BV',cargas:1,tonC:cfgG.bvT,tonTotal:cfgG.bvT,equipe:cfgG.bvR,info:'Aguardando confirmação',isBV:true,solKey:'BV'});
  massas.sort((a,b)=>a.isBV-b.isBV);

  const totalC=massas.reduce((s,m)=>s+m.cargas,0);
  const totalT=massas.reduce((s,m)=>s+m.tonTotal,0);
  const prod=usinaCfg.prod||100;
  const tempoH=totalT/prod;
  const [hI,mI]=(usinaCfg.horaInicio||'18:30').split(':').map(Number);
  const minI=hI*60+mI,minF=minI+Math.round(tempoH*60);
  const hFim=Math.floor(minF/60)%24,mFim=minF%60;
  const fimStr=String(hFim).padStart(2,'0')+':'+String(mFim).padStart(2,'0');
  const tempoStr=String(Math.floor(tempoH)).padStart(2,'0')+':'+String(Math.round((tempoH%1)*60)).padStart(2,'0')+':00';

  const stKey='usina_status_'+dataAtual;
  let stMap=JSON.parse(localStorage.getItem(stKey)||'{}');
  const concluidos=massas.filter(m=>stMap[m.solKey]==='concluido').length;
  const tonConcluida=massas.filter(m=>stMap[m.solKey]==='concluido').reduce((s,m)=>s+m.tonTotal,0);

  let html=`
  <div class="prog-head">
    <div>
      <div class="prog-titulo">Programação Usina</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px;">Neovia Engenharia · BR-101/SC</div>
    </div>
    <div class="prog-meta">
      <div class="mi"><div class="ml">Data</div><div class="mv vm">${fmtD(dataAtual)}</div></div>
      <div class="mi"><div class="ml">Hora início usinagem</div><div class="mv vm">${usinaCfg.horaInicio||'18:30'}</div></div>
      <div class="mi"><div class="ml">Fim previsto</div><div class="mv">${fimStr}</div></div>
      <div class="mi"><div class="ml">Encarregado</div><div class="mv" style="font-size:15px">${usinaCfg.encarregado||'–'}</div></div>
    </div>
  </div>

  <div class="cards">
    <div class="card vm"><div class="cv">${fmt(totalT)}</div><div class="cl">Total toneladas</div></div>
    <div class="card az"><div class="cv">${totalC}</div><div class="cl">Total cargas</div></div>
    <div class="card am"><div class="cv">${prod} t/h</div><div class="cl">Produção usina</div></div>
    <div class="card vd"><div class="cv">${concluidos}/${massas.length}</div><div class="cl">Massas concluídas</div></div>
  </div>

  <div class="tw">
    <table class="tu">
      <thead><tr>
        <th>Caminhão</th><th>Usinagem</th><th>Seq.</th>
        <th>Cargas</th><th>Peso/Carga (t)</th><th>Peso Total (t)</th>
        <th>Equipe</th><th>Informações</th><th>Status</th>
      </tr></thead><tbody>`;

  massas.forEach(m=>{
    const st=stMap[m.solKey]||'pendente';
    const cargasF=Math.min(parseInt(stMap[m.solKey+'_cargas']||0),m.cargas);
    const pct=m.cargas>0?Math.round((cargasF/m.cargas)*100):0;
    const dotClass={pendente:'dot-p',usinando:'dot-u',concluido:'dot-c'}[st];

    html+=`<tr>
      <td class="c-cam">${m.cam}</td>
      <td class="c-usi">${m.usin}</td>
      <td class="c-seq">${m.seq}º</td>
      <td class="c-car">
        <b>${m.cargas}</b>
        ${m.cargas>1?`<div class="prog-bar-wrap">
          <div class="prog-bar-lbl"><span>${cargasF} feitas</span><span>${pct}%</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        </div>`:''}
      </td>
      <td class="c-pes">${fmt(m.tonC)}</td>
      <td class="c-tot">${fmt(m.tonTotal)}</td>
      <td class="c-eq">${m.equipe}</td>
      <td class="c-info ${m.isBV?'aguardando':''}">${m.info}</td>
      <td>
        <div class="st-wrap">
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px;">
            <span class="dot-st ${dotClass}"></span>
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);text-transform:uppercase;">${{pendente:'Pendente',usinando:'Usinando',concluido:'Concluído'}[st]}</span>
          </div>
          <select class="st-sel ${st}" onchange="mudarStatus('${m.solKey}',this.value,'${dataAtual}')">
            <option value="pendente" ${st==='pendente'?'selected':''}>⏸ Pendente</option>
            <option value="usinando" ${st==='usinando'?'selected':''}>⚙️ Usinando</option>
            <option value="concluido" ${st==='concluido'?'selected':''}>✔ Concluído</option>
          </select>
          ${m.cargas>1&&st==='usinando'?`
          <div class="ct-wrap">
            <button class="ct-btn" onclick="ajustarCarga('${m.solKey}','${dataAtual}',-1)">−</button>
            <span class="ct-val">${cargasF}/${m.cargas} cargas</span>
            <button class="ct-btn" onclick="ajustarCarga('${m.solKey}','${dataAtual}',+1)">+</button>
          </div>`:''}
        </div>
      </td>
    </tr>`;
  });

  html+=`<tr class="tr-total">
    <td colspan="2"></td><td>TOTAL</td>
    <td class="c-car">${totalC}</td><td></td>
    <td class="c-tot">${fmt(totalT)}</td>
    <td colspan="2" style="text-align:left;padding-left:14px;font-size:12px;color:var(--verde)">
      ✔ ${fmt(tonConcluida)} t concluídas de ${fmt(totalT)} t
    </td><td></td>
  </tr></tbody></table></div>

  <div class="tempo-wrap">
    <div class="tempo-head">⏱ Tempo e produção</div>
    <div class="tempo-grid">
      <div class="ti"><div class="tl">Prod. Usina</div><div class="tv">${prod} t/h</div></div>
      <div class="ti"><div class="tl">Divisão</div><div class="tv">${(totalT/prod).toFixed(2)}</div></div>
      <div class="ti"><div class="tl">Tempo Usina</div><div class="tv vm">${tempoStr}</div></div>
      <div class="ti"><div class="tl">Início Usina</div><div class="tv">${usinaCfg.horaInicio||'18:30'}</div></div>
      <div class="ti"><div class="tl">Fim Usina (prev.)</div><div class="tv vm">${fimStr}</div></div>
      <div class="ti"><div class="tl">Fator de perda</div><div class="tv">${usinaCfg.fator||1.025}</div></div>
    </div>
  </div>`;

  document.getElementById('conteudo').innerHTML=html;
}

function mudarStatus(solKey,valor,dataKey){
  const stKey='usina_status_'+dataKey;
  let st=JSON.parse(localStorage.getItem(stKey)||'{}');
  st[solKey]=valor;
  if(valor==='concluido') st[solKey+'_cargas']=9999;
  if(valor==='pendente') delete st[solKey+'_cargas'];
  localStorage.setItem(stKey,JSON.stringify(st));
  renderProg();
}

function ajustarCarga(solKey,dataKey,delta){
  const stKey='usina_status_'+dataKey;
  let st=JSON.parse(localStorage.getItem(stKey)||'{}');
  st[solKey+'_cargas']=Math.max(0,(parseInt(st[solKey+'_cargas']||0))+delta);
  localStorage.setItem(stKey,JSON.stringify(st));
  renderProg();
}

function mapSol(sol){
  const s=(sol||'').toLowerCase();
  if(s.includes('16mm')||s==='ff')return'16 mm borracha';
  if(s.includes('25mm'))return'25 mm borracha';
  if(s==='gap')return'GAP';if(s==='bv')return'BV';
  if(s==='lsam')return'LSAM';if(s==='cd')return'CD';
  if(s==='ff-1')return'FF-1';if(s==='fr6')return'FR6';
  return sol;
}

function fmt(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function n3(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:3,maximumFractionDigits:3});}
</script>
</body>
</html>
