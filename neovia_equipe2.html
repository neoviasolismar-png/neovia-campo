<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neovia – Programação de Campo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--vm:#CC0000;--bg:#111;--card:#1A1A1A;--card2:#222;--borda:#333;--branco:#F0F0F0;--muted:#888;--verde:#22C55E;--azul:#3B82F6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--branco);font-family:'Barlow',sans-serif;font-size:13px;min-height:100vh;}

header{background:#000;border-bottom:3px solid var(--vm);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:50;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--vm);letter-spacing:-1px;}

.logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:-2px;font-family:'Barlow Condensed',sans-serif;}
.badge-campo{background:var(--vm);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;padding:3px 10px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;}

.nav-data{background:#0A0A0A;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;padding:8px 16px;gap:10px;flex-wrap:wrap;}
.nav-esq{display:flex;align-items:center;gap:8px;}
.btn-nav{background:var(--card2);border:1px solid var(--borda);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;transition:.15s;}
.btn-nav:hover,.btn-nav.hoje{border-color:var(--vm);color:#fff;}
.data-display{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--vm);text-align:center;min-width:170px;}
.data-display span{display:block;font-size:10px;color:var(--muted);font-weight:400;text-transform:uppercase;letter-spacing:0.5px;}
.btn-acao{background:var(--card2);border:1px solid var(--borda);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;transition:.15s;white-space:nowrap;}
.btn-acao:hover{border-color:var(--vm);color:#fff;}

.conteudo{padding:14px 16px;max-width:1600px;margin:0 auto;}

/* BANNER */
.pub-banner{display:flex;align-items:center;gap:8px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:4px;padding:7px 12px;margin-bottom:10px;font-size:11px;color:var(--verde);}
.dot-pub{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px;}
.card{background:var(--card);border:1px solid var(--borda);border-radius:4px;padding:10px;text-align:center;}
.card.vm{border-top:3px solid var(--vm);}
.card.az{border-top:3px solid var(--azul);}
.card.vd{border-top:3px solid var(--verde);}
.card .cv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;}
.card .cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

/* TABELA */
.tw{overflow-x:auto;border-radius:4px;border:1px solid var(--borda);margin-bottom:12px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#000;position:sticky;top:0;z-index:2;}
th{padding:8px 7px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);border-bottom:2px solid var(--borda);white-space:nowrap;}
td{padding:7px 7px;text-align:center;border-bottom:1px solid var(--borda);white-space:nowrap;}
tr.norte-r{background:rgba(59,130,246,0.05);}
tr.sul-r{background:rgba(34,197,94,0.05);}

/* CABEÇALHO DO FECHA */
tr.fecha-title td{background:#1a0000;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;padding:10px 14px;border-top:2px solid var(--vm);border-bottom:1px solid var(--vm);color:#fff;letter-spacing:0.5px;}
tr.fecha-title td .fecha-badge{display:inline-block;background:var(--vm);color:#fff;padding:2px 10px;border-radius:3px;font-size:12px;margin-right:8px;}
tr.fecha-title td .fecha-info{font-size:11px;color:#aaa;font-weight:400;margin-left:10px;}

/* SUBTOTAIS */
tr.fecha-sub td{background:#1a1a1a;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;border-top:1px solid var(--borda);}
tr.total-geral td{background:rgba(204,0,0,0.1);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;border-top:2px solid var(--vm);}

.km{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;}
.km-p{color:#F87171;font-size:12px;}
.pv{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;}
.badge-n{display:inline-block;padding:2px 6px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;background:rgba(59,130,246,0.2);color:#60A5FA;border:1px solid #3B82F6;}
.badge-s{display:inline-block;padding:2px 6px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;background:rgba(34,197,94,0.2);color:#4ADE80;border:1px solid #22C55E;}
.badge-tot{background:rgba(204,0,0,0.15);color:#F87171;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;padding:2px 8px;border-radius:3px;}
.obs-c{color:#F59E0B;font-style:italic;font-size:11px;max-width:150px;white-space:normal;text-align:left;}

/* SEPARADOR DE SENTIDO */
tr.sentido-sep td{background:#0a0a0a;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--borda);color:#555;letter-spacing:1px;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--branco);margin-bottom:8px;}

/* PRINT */
@media print{
  header,.nav-data,.btn-acao,.btn-nav,.pub-banner{display:none!important;}
  body{background:#fff;color:#000;}
  .conteudo{padding:0;}
  .print-cabecalho{display:flex!important;}
  tr.norte-r{background:#EBF5FF!important;-webkit-print-color-adjust:exact;}
  tr.sul-r{background:#EFFFEB!important;-webkit-print-color-adjust:exact;}
  tr.fecha-title td{background:#FFEEEE!important;color:#CC0000!important;-webkit-print-color-adjust:exact;}
  tr.fecha-title td .fecha-badge{background:#CC0000!important;color:#fff!important;-webkit-print-color-adjust:exact;}
  tr.fecha-sub td{background:#f9f9f9!important;}
  tr.total-geral td{background:#FFEEEE!important;-webkit-print-color-adjust:exact;}
  .km-p{color:#CC0000!important;}
  .badge-n{background:#DBEAFE!important;color:#1D4ED8!important;-webkit-print-color-adjust:exact;}
  .badge-s{background:#DCFCE7!important;color:#15803D!important;-webkit-print-color-adjust:exact;}
  .obs-c{color:#B45309!important;}
  .tw{border:1px solid #ccc;}
  table{font-size:10px;}
  td,th{padding:4px 6px;}
  .cards{display:none!important;}
}

.print-cabecalho{display:none;align-items:center;justify-content:space-between;padding:10px 0 16px;border-bottom:2px solid #CC0000;margin-bottom:14px;}
.pc-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:#CC0000;letter-spacing:-1px;}
.pc-logo span{font-size:11px;font-weight:400;color:#555;display:block;letter-spacing:1px;text-transform:uppercase;}
.pc-info{text-align:right;font-size:11px;color:#555;}
.pc-info b{display:block;font-size:14px;color:#CC0000;font-family:'Barlow Condensed',sans-serif;font-weight:800;}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div>
      <div class="logo-n">NEOVIA</div>
      <div class="logo-sub">Programação de Campo</div>
    </div>
  </div>
  <span class="badge-campo">🦺 Equipe Campo</span>
</header>

<div class="nav-data">
  <div class="nav-esq">
    <button class="btn-nav" onclick="navData(-1)">◀</button>
    <div class="data-display" id="dataDisplay"><span>Noite</span>–</div>
    <button class="btn-nav" onclick="navData(+1)">▶</button>
    <button class="btn-nav hoje" onclick="irHoje()">Hoje</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="btn-acao" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="conteudo">
  <!-- Print header -->
  <div class="print-cabecalho">
    <div class="pc-logo">NEOVIA<span>Engenharia</span></div>
    <div class="pc-info">Programação de Campo<b id="printNoite">–</b></div>
  </div>

  <div id="bannerPub" class="pub-banner" style="display:none">
    <div class="dot-pub"></div>
    <span id="bannerTxt"></span>
  </div>

  <div class="cards" id="cardsTop" style="display:none">
    <div class="card vm"><div class="cv" id="cTotal">0,00</div><div class="cl">Ton Total</div></div>
    <div class="card az"><div class="cv" id="cNorte" style="color:#60A5FA">0,00</div><div class="cl">Norte</div></div>
    <div class="card vd"><div class="cv" id="cSul" style="color:#4ADE80">0,00</div><div class="cl">Sul</div></div>
    <div class="card vm"><div class="cv" id="cItens">0</div><div class="cl">Itens</div></div>
    <div class="card vm"><div class="cv" id="cFechas">0</div><div class="cl">Fechas</div></div>
  </div>

  <div id="tabela"></div>
</div>

<script>
let dataAtual = hoje();
let SHEETS_URL = localStorage.getItem('nv3_url') || '';

async function buscarDoSheets(dataI){
  if(!SHEETS_URL) return null;
  try{
    const r = await fetch(SHEETS_URL+'?action=buscar&dataI='+dataI);
    const d = await r.json();
    return d.ok ? d.data : null;
  } catch(e){ return null; }
}

irHoje();

function hoje(){
  const now=new Date(),d=new Date();
  if(now.getHours()<12) d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function navData(delta){const d=new Date(dataAtual+'T12:00:00');d.setDate(d.getDate()+delta);dataAtual=d.toISOString().slice(0,10);renderProg();}
function irHoje(){dataAtual=hoje();renderProg();}
function fmtD(d){if(!d)return'–';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDL(d){if(!d)return'–';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}

async function renderProg(){
  const d2=new Date(dataAtual+'T12:00:00');d2.setDate(d2.getDate()+1);
  const dataF=d2.toISOString().slice(0,10);
  const noiteLabel=`${fmtD(dataAtual)} → ${fmtD(dataF)}`;
  document.getElementById('dataDisplay').innerHTML=`<span>Noite</span>${noiteLabel}`;
  document.getElementById('printNoite').textContent=noiteLabel;

  // Tentar nv2 primeiro, depois nv (compatibilidade)
  // Tentar localStorage primeiro, depois Sheets
  let dadosStr=localStorage.getItem('nv3_prog_'+dataAtual)||localStorage.getItem('nv2_prog_'+dataAtual)||localStorage.getItem('nv_prog_'+dataAtual);
  
  if(!dadosStr && SHEETS_URL){
    document.getElementById('tabela').innerHTML='<div class="empty"><div class="ei">🔄</div><h2>Buscando programação...</h2></div>';
    const prog = await buscarDoSheets(dataAtual);
    if(prog){
      dadosStr = JSON.stringify(prog);
      localStorage.setItem('nv3_prog_'+dataAtual, dadosStr);
    }
  }

  if(!dadosStr){
    document.getElementById('bannerPub').style.display='none';
    document.getElementById('cardsTop').style.display='none';
    document.getElementById('tabela').innerHTML=`<div class="empty"><div class="ei">🌙</div><h2>Sem programação para esta noite</h2><p>Aguarde o gestor publicar a programação.</p></div>`;
    return;
  }

  const prog=JSON.parse(dadosStr);

  // Agendamento
  if(prog.liberarEm){
    const agora=new Date(),liberar=new Date(prog.liberarEm);
    if(agora<liberar){
      const diff=liberar-agora;
      const hF=Math.floor(diff/3600000),mF=Math.floor((diff%3600000)/60000);
      document.getElementById('bannerPub').style.display='none';
      document.getElementById('cardsTop').style.display='none';
      document.getElementById('tabela').innerHTML=`<div class="empty"><div class="ei">⏳</div><h2>Programação em breve</h2><p>Disponível às <b style="color:var(--vm)">${new Date(prog.liberarEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</b></p><p style="margin-top:6px;font-size:11px">Faltam ${hF}h ${mF}min</p></div>`;
      setTimeout(()=>renderProg(),diff+1000);
      return;
    }
  }

  const pub=new Date(prog.publicadoEm);
  document.getElementById('bannerPub').style.display='flex';
  document.getElementById('bannerTxt').textContent=`Publicado às ${pub.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} de ${pub.toLocaleDateString('pt-BR')}`;

  const itens=prog.itens||[];
  const norte=itens.filter(i=>i.sentido==='Norte');
  const sul=itens.filter(i=>i.sentido!=='Norte');
  const tN=norte.reduce((s,i)=>s+i.peso,0);
  const tS=sul.reduce((s,i)=>s+i.peso,0);

  // Stats
  document.getElementById('cNorte').textContent=fmt(tN);
  document.getElementById('cSul').textContent=fmt(tS);
  document.getElementById('cTotal').textContent=fmt(tN+tS);
  document.getElementById('cItens').textContent=itens.length;
  const todasFechas=new Set(itens.map(i=>i.inted||'1'));
  document.getElementById('cFechas').textContent=todasFechas.size;
  document.getElementById('cardsTop').style.display='grid';

  // Ordenar
  function ordenar(arr,desc){
    return [...arr].sort((a,b)=>{
      const fa=parseInt(a.inted)||0,fb=parseInt(b.inted)||0;
      if(fa!==fb) return fa-fb;
      return desc?b.kpi-a.kpi:a.kpi-b.kpi;
    });
  }
  const norteOrd=ordenar(norte,true);
  const sulOrd=ordenar(sul,false);

  let html='<div class="tw"><table>';
  html+='<thead><tr><th>Fecha</th><th>KM Pista Ini.</th><th>KM Pista Fim</th><th>KM Proj. Ini.</th><th>KM Proj. Fim</th><th>Local</th><th>Sentido</th><th>Faixa</th><th>Comp(m)</th><th>Larg(m)</th><th>Esp(m)</th><th>Solução</th><th>Observação</th><th>Demanda</th><th>Total(t)</th></tr></thead><tbody>';

  function renderSentido(arr,cls,sentidoLabel,cor){
    if(!arr.length) return '';
    const totalS=arr.reduce((s,i)=>s+i.peso,0);

    // Separador de sentido
    let h=`<tr class="sentido-sep"><td colspan="15">▶ PISTA ${sentidoLabel.toUpperCase()}</td></tr>`;

    // Agrupar por fecha
    const fechas={};
    arr.forEach(i=>{const k=String(i.inted||'1');if(!fechas[k])fechas[k]=[];fechas[k].push(i);});
    const fks=Object.keys(fechas).sort((a,b)=>parseInt(a)-parseInt(b));

    fks.forEach(fk=>{
      const grp=fechas[fk];
      const tF=grp.reduce((s,i)=>s+i.peso,0);
      const kmMin=grp.reduce((mn,i)=>Math.min(mn,Math.min(i.kpi,i.kpf)),Infinity);
      const kmMax=grp.reduce((mx,i)=>Math.max(mx,Math.max(i.kpi,i.kpf)),-Infinity);

      // Cabeçalho da fecha — destaque visual
      h+=`<tr class="fecha-title"><td colspan="15">
        <span class="fecha-badge">FECHA ${fk}</span>
        <span style="font-weight:600">${sentidoLabel} · ${grp.length} item(s)</span>
        <span class="fecha-info">KM ${n3(cls==='norte'?kmMax:kmMin)} → ${n3(cls==='norte'?kmMin:kmMax)}</span>
        <span style="float:right;color:var(--vm);font-weight:800">${fmt(tF)} t</span>
      </td></tr>`;

      grp.forEach(it=>{
        h+=`<tr class="${cls}-r">
          <td style="font-weight:700;color:var(--vm)">${it.inted||'–'}</td>
          <td class="km">${n3(it.kpi)}</td><td class="km">${n3(it.kpf)}</td>
          <td class="km km-p">${n3(it.kpri)}</td><td class="km km-p">${n3(it.kprf)}</td>
          <td>${it.local||''}</td>
          <td><span class="badge-${cls==='norte'?'n':'s'}">${it.sentido}</span></td>
          <td>${it.faixa||''}</td>
          <td><b>${it.comp}</b></td><td>${it.larg}</td><td>${it.esp}</td>
          <td><b>${it.solucao||''}</b></td>
          <td><span class="obs-c">${it.obs||''}</span></td>
          <td>${it.demanda||''}</td>
          <td class="pv">${fmt(it.peso)}</td>
        </tr>`;
      });

      h+=`<tr class="fecha-sub"><td colspan="14" style="text-align:right;color:var(--muted)">Total Fecha ${fk} — ${sentidoLabel}</td><td><span class="badge-tot">${fmt(tF)} t</span></td></tr>`;
    });

    h+=`<tr class="fecha-sub"><td colspan="14" style="text-align:right;font-size:12px">Total Pista ${sentidoLabel}</td><td><span class="badge-tot" style="font-size:13px">${fmt(totalS)} t</span></td></tr>`;
    return h;
  }

  html+=renderSentido(norteOrd,'norte','Norte','#3B82F6');
  html+=renderSentido(sulOrd,'sul','Sul','#22C55E');

  const tG=tN+tS;
  html+=`<tr class="total-geral"><td colspan="14" style="text-align:right;font-size:13px">TOTAL GERAL DA NOITE</td><td><span class="badge-tot" style="font-size:14px">${fmt(tG)} t</span></td></tr>`;
  html+='</tbody></table></div>';
  document.getElementById('tabela').innerHTML=html;
}

function fmt(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function n3(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:3,maximumFractionDigits:3});}
</script>
</body>
</html>
