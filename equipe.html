<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neovia – Programação de Campo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--vm:#CC0000;--bg:#111;--card:#1A1A1A;--card2:#222;--borda:#333;--branco:#F0F0F0;--muted:#888;--verde:#22C55E;--azul:#3B82F6;--amarelo:#F5A623;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--branco);font-family:'Barlow',sans-serif;font-size:13px;min-height:100vh;}
header{background:#000;border-bottom:3px solid var(--vm);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:50;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:#fff;letter-spacing:-1px;}
.logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:-2px;font-family:'Barlow Condensed',sans-serif;}
.badge-campo{background:var(--vm);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;padding:3px 10px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;}
.nav-data{background:#0A0A0A;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between;padding:8px 16px;gap:10px;flex-wrap:wrap;}
.nav-esq{display:flex;align-items:center;gap:8px;}
.btn-nav{background:var(--card2);border:1px solid var(--borda);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;transition:.15s;}
.btn-nav:hover,.btn-nav.hoje{border-color:var(--vm);color:#fff;}
.data-display{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#fff;text-align:center;min-width:140px;}
.data-display span{display:block;font-size:10px;color:var(--muted);font-weight:400;text-transform:uppercase;letter-spacing:0.5px;}
.btn-acao{background:var(--card2);border:1px solid var(--borda);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;transition:.15s;white-space:nowrap;}
.btn-acao:hover{border-color:var(--vm);color:#fff;}
/* TABS CAMPO/USINA */
.view-tabs{display:flex;background:#000;border-bottom:1px solid var(--borda);}
.view-tab{flex:1;padding:11px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:.2s;}
.view-tab.ativo{color:#fff;border-bottom-color:var(--vm);}
.view-content{display:none;}
.view-content.ativo{display:block;}
.conteudo{padding:14px 16px;max-width:1600px;margin:0 auto;}
.pub-banner{display:flex;align-items:center;gap:8px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:4px;padding:7px 12px;margin-bottom:10px;font-size:11px;color:var(--verde);}
.dot-pub{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:10px;}
.card{background:var(--card);border:1px solid var(--borda);border-radius:4px;padding:10px;text-align:center;}
.card.vm{border-top:3px solid var(--vm);}
.card.az{border-top:3px solid var(--azul);}
.card.vd{border-top:3px solid var(--verde);}
.card .cv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;}
.card .cl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.tw{overflow-x:auto;border-radius:4px;border:1px solid var(--borda);margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:#000;position:sticky;top:0;z-index:2;}
th{padding:9px 7px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#ccc;border-bottom:2px solid var(--borda);white-space:nowrap;}
td{padding:7px 7px;text-align:center;border-bottom:1px solid var(--borda);white-space:nowrap;}
tr.norte-r{background:rgba(59,130,246,0.05);}
tr.sul-r{background:rgba(34,197,94,0.05);}
tr.sentido-sep td{background:#0a0a0a;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--borda);color:#555;letter-spacing:1px;}
tr.fecha-title td{background:#1a0000;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;padding:9px 14px;border-top:2px solid var(--vm);border-bottom:1px solid var(--vm);color:#fff;letter-spacing:0.5px;}
.fecha-badge{display:inline-block;background:var(--vm);color:#fff;padding:2px 8px;border-radius:3px;font-size:11px;margin-right:6px;}
tr.fecha-sub td{background:#1a1a1a;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;border-top:1px solid var(--borda);}
tr.total-geral td{background:rgba(204,0,0,0.1);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;border-top:2px solid var(--vm);}
.km{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;}
.km-p{color:#F87171;font-size:12px;}
.pv{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;}
.badge-n{display:inline-block;padding:2px 6px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;background:rgba(59,130,246,0.2);color:#60A5FA;border:1px solid #3B82F6;}
.badge-s{display:inline-block;padding:2px 6px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;background:rgba(34,197,94,0.2);color:#4ADE80;border:1px solid #22C55E;}
.badge-tot{background:rgba(204,0,0,0.15);color:#F87171;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;padding:2px 8px;border-radius:3px;}
.obs-c{color:#F59E0B;font-style:italic;font-size:11px;max-width:140px;white-space:normal;text-align:left;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--branco);margin-bottom:8px;}
/* USINA EMBUTIDA */
.u-head{background:var(--card);border:1px solid var(--borda);border-top:3px solid var(--vm);border-radius:4px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.u-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;text-transform:uppercase;color:var(--vm);}
.u-meta{display:flex;gap:16px;flex-wrap:wrap;}
.u-mi{text-align:center;}
.u-mi .uv{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--vm);}
.u-mi .ul{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
table.tu{width:100%;border-collapse:collapse;font-size:13px;}
table.tu th{background:#000;padding:9px 10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;color:#ccc;border-bottom:2px solid var(--borda);white-space:nowrap;}
table.tu td{padding:12px 10px;border-bottom:1px solid var(--borda);text-align:center;vertical-align:middle;}
table.tu tr.tr-total td{background:rgba(204,0,0,0.08);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;border-top:2px solid var(--vm);}
/* PRINT */
@media print{
  header,.nav-data,.btn-acao,.btn-nav,.pub-banner,.view-tabs,.cards{display:none!important;}
  body{background:#fff;color:#000;}
  .view-content{display:block!important;}
  tr.norte-r{background:#EBF5FF!important;-webkit-print-color-adjust:exact;}
  tr.sul-r{background:#EFFFEB!important;-webkit-print-color-adjust:exact;}
  tr.fecha-title td{background:#FFEEEE!important;color:#CC0000!important;-webkit-print-color-adjust:exact;}
  .fecha-badge{background:#CC0000!important;color:#fff!important;-webkit-print-color-adjust:exact;}
  tr.fecha-sub td{background:#f9f9f9!important;}
  tr.total-geral td{background:#FFEEEE!important;-webkit-print-color-adjust:exact;}
  .km-p{color:#CC0000!important;}
  .obs-c{color:#B45309!important;}
  .tw{border:1px solid #ccc;}
  table{font-size:10px;}
  td,th{padding:4px 6px;}
}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div><div class="logo-n">NEOVIA</div><div class="logo-sub">Programação de Campo</div></div>
  </div>
  <span class="badge-campo">🦺 Equipe Campo</span>
</header>

<div class="nav-data">
  <div class="nav-esq">
    <button class="btn-nav" onclick="navData(-1)">◀</button>
    <div class="data-display" id="dataDisplay"><span>Noite de</span>–</div>
    <button class="btn-nav" onclick="navData(+1)">▶</button>
    <button class="btn-nav hoje" onclick="irHoje()">Hoje</button>
  </div>
  <button class="btn-acao" onclick="window.print()">🖨 Imprimir</button>
</div>

<div class="view-tabs">
  <div class="view-tab ativo" id="tab-campo" onclick="trocarView('campo')">🦺 Campo</div>
  <div class="view-tab" id="tab-usina" onclick="trocarView('usina')">🏭 Usina</div>
</div>

<div class="conteudo">
  <div id="bannerPub" class="pub-banner" style="display:none">
    <div class="dot-pub"></div>
    <span id="bannerTxt"></span>
  </div>

  <!-- CAMPO -->
  <div class="view-content ativo" id="view-campo">
    <div class="cards" id="cardsTop" style="display:none">
      <div class="card vm"><div class="cv" id="cTotal">0,00</div><div class="cl">Ton Total</div></div>
      <div class="card az"><div class="cv" id="cNorte" style="color:#60A5FA">0,00</div><div class="cl">Norte</div></div>
      <div class="card vd"><div class="cv" id="cSul" style="color:#4ADE80">0,00</div><div class="cl">Sul</div></div>
      <div class="card vm"><div class="cv" id="cItens">0</div><div class="cl">Itens</div></div>
      <div class="card vm"><div class="cv" id="cFechas">0</div><div class="cl">Fechas</div></div>
    </div>
    <div id="tabela"></div>
  </div>

  <!-- USINA -->
  <div class="view-content" id="view-usina">
    <div id="conteudo-usina">
      <div class="empty"><div class="ei">🏭</div><h2>Clique em Usina para carregar</h2></div>
    </div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx6JClD3tDPPgoXtr6fvpBU6yt1MHa42JIOfJJgZZcoKTzLvfxQ05fS2yFmSGvwKzpZbg/exec';
let dataAtual = hoje();
irHoje();

function hoje(){const now=new Date();if(now.getHours()<8)now.setDate(now.getDate()-1);return now.toISOString().slice(0,10);}
function navData(delta){const d=new Date(dataAtual+'T12:00:00');d.setDate(d.getDate()+delta);dataAtual=d.toISOString().slice(0,10);renderProg();}
function irHoje(){dataAtual=hoje();renderProg();}
function fmtD(d){if(!d)return'–';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}

async function buscarDoSheets(dataI){
  try{
    const r=await fetch(SHEETS_URL+'?action=buscar&dataI='+encodeURIComponent(dataI));
    const d=await r.json();
    return d.ok?d.data:null;
  }catch(e){return null;}
}

async function renderProg(){
  document.getElementById('dataDisplay').innerHTML='<span>Noite de</span>'+fmtD(dataAtual);
  let dadosStr=localStorage.getItem('nv3_prog_'+dataAtual);
  if(!dadosStr){
    document.getElementById('tabela').innerHTML='<div class="empty"><div class="ei">🔄</div><h2>Buscando...</h2></div>';
    const p=await buscarDoSheets(dataAtual);
    if(p){dadosStr=JSON.stringify(p);localStorage.setItem('nv3_prog_'+dataAtual,dadosStr);}
  }
  if(!dadosStr){
    document.getElementById('bannerPub').style.display='none';
    document.getElementById('cardsTop').style.display='none';
    document.getElementById('tabela').innerHTML='<div class="empty"><div class="ei">🌙</div><h2>Sem programação para esta noite</h2><p>Aguarde o gestor publicar.</p></div>';
    return;
  }
  const prog=JSON.parse(dadosStr);
  if(prog.liberarEm){
    const agora=new Date(),lib=new Date(prog.liberarEm);
    if(agora<lib){
      const diff=lib-agora,hF=Math.floor(diff/3600000),mF=Math.floor((diff%3600000)/60000);
      document.getElementById('bannerPub').style.display='none';
      document.getElementById('cardsTop').style.display='none';
      document.getElementById('tabela').innerHTML=`<div class="empty"><div class="ei">⏳</div><h2>Programação em breve</h2><p>Disponível às <b style="color:var(--vm)">${new Date(prog.liberarEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</b></p><p style="margin-top:6px;font-size:11px">Faltam ${hF}h ${mF}min</p></div>`;
      setTimeout(()=>renderProg(),diff+1000);
      return;
    }
  }
  const pub=new Date(prog.publicadoEm);
  document.getElementById('bannerPub').style.display='flex';
  document.getElementById('bannerTxt').textContent=`Publicado às ${pub.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} de ${pub.toLocaleDateString('pt-BR')}`;
  const itens=prog.itens||[];
  const norte=itens.filter(i=>i.sentido==='Norte');
  const sul=itens.filter(i=>i.sentido!=='Norte');
  const tN=norte.reduce((s,i)=>s+i.peso,0);
  const tS=sul.reduce((s,i)=>s+i.peso,0);
  document.getElementById('cNorte').textContent=fmt(tN);
  document.getElementById('cSul').textContent=fmt(tS);
  document.getElementById('cTotal').textContent=fmt(tN+tS);
  document.getElementById('cItens').textContent=itens.length;
  const todasFechas=new Set(itens.map(i=>i.inted||'1'));
  document.getElementById('cFechas').textContent=todasFechas.size;
  document.getElementById('cardsTop').style.display='grid';
  function ordenar(arr,desc){return[...arr].sort((a,b)=>{const fa=parseInt(a.inted)||0,fb=parseInt(b.inted)||0;if(fa!==fb)return fa-fb;return desc?b.kpi-a.kpi:a.kpi-b.kpi;});}
  const norteOrd=ordenar(norte,true);
  const sulOrd=ordenar(sul,false);
  let html='<div class="tw"><table><thead><tr><th>Fecha</th><th>KM Pista Ini.</th><th>KM Pista Fim</th><th>KM Proj. Ini.</th><th>KM Proj. Fim</th><th>Local</th><th>Sentido</th><th>Faixa</th><th>Comp(m)</th><th>Larg(m)</th><th>Esp(m)</th><th>Solução</th><th>Observação</th><th>Demanda</th><th>Total(t)</th></tr></thead><tbody>';
  function renderSentido(arr,cls,lbl){
    if(!arr.length)return'';
    const totalS=arr.reduce((s,i)=>s+i.peso,0);
    let h=`<tr class="sentido-sep"><td colspan="15">▶ PISTA ${lbl.toUpperCase()}</td></tr>`;
    const fechas={};
    arr.forEach(i=>{const k=String(i.inted||'1');if(!fechas[k])fechas[k]=[];fechas[k].push(i);});
    Object.keys(fechas).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(fk=>{
      const grp=fechas[fk];
      const tF=grp.reduce((s,i)=>s+i.peso,0);
      const kmMin=grp.reduce((mn,i)=>Math.min(mn,Math.min(i.kpi,i.kpf)),Infinity);
      const kmMax=grp.reduce((mx,i)=>Math.max(mx,Math.max(i.kpi,i.kpf)),-Infinity);
      h+=`<tr class="fecha-title"><td colspan="15"><span class="fecha-badge">FECHA ${fk}</span><span>${lbl} · ${grp.length} item(s) · KM ${n3(cls==='norte'?kmMax:kmMin)} → ${n3(cls==='norte'?kmMin:kmMax)}</span><span style="float:right;color:var(--vm);font-weight:800">${fmt(tF)} t</span></td></tr>`;
      grp.forEach(it=>{
        h+=`<tr class="${cls}-r"><td style="font-weight:700;color:var(--vm)">${it.inted||'–'}</td><td class="km">${n3(it.kpi)}</td><td class="km">${n3(it.kpf)}</td><td class="km km-p">${n3(it.kpri)}</td><td class="km km-p">${n3(it.kprf)}</td><td>${it.local||''}</td><td><span class="badge-${cls==='norte'?'n':'s'}">${it.sentido}</span></td><td>${it.faixa||''}</td><td><b>${it.comp}</b></td><td>${it.larg}</td><td>${it.esp}</td><td><b>${it.solucao||''}</b></td><td><span class="obs-c">${it.obs||''}</span></td><td>${it.demanda||''}</td><td class="pv">${fmt(it.peso)}</td></tr>`;
      });
      h+=`<tr class="fecha-sub"><td colspan="14" style="text-align:right;color:var(--muted)">Total Fecha ${fk} — ${lbl}</td><td><span class="badge-tot">${fmt(tF)} t</span></td></tr>`;
    });
    h+=`<tr class="fecha-sub"><td colspan="14" style="text-align:right">Total Pista ${lbl}</td><td><span class="badge-tot" style="font-size:13px">${fmt(totalS)} t</span></td></tr>`;
    return h;
  }
  html+=renderSentido(norteOrd,'norte','Norte');
  html+=renderSentido(sulOrd,'sul','Sul');
  html+=`<tr class="total-geral"><td colspan="14" style="text-align:right;font-size:13px">TOTAL GERAL DA NOITE</td><td><span class="badge-tot" style="font-size:14px">${fmt(tN+tS)} t</span></td></tr>`;
  html+='</tbody></table></div>';
  document.getElementById('tabela').innerHTML=html;
}

// ── CAMPO / USINA ──
function trocarView(view){
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('ativo'));
  document.getElementById('tab-'+view).classList.add('ativo');
  document.getElementById('view-campo').classList.toggle('ativo',view==='campo');
  document.getElementById('view-usina').classList.toggle('ativo',view==='usina');
  if(view==='usina') renderUsina();
}

async function renderUsina(){
  const wrap=document.getElementById('conteudo-usina');
  let dadosStr=localStorage.getItem('nv3_prog_'+dataAtual);
  if(!dadosStr){
    wrap.innerHTML='<div class="empty"><div class="ei">🔄</div><h2>Buscando...</h2></div>';
    const p=await buscarDoSheets(dataAtual);
    if(p){dadosStr=JSON.stringify(p);localStorage.setItem('nv3_prog_'+dataAtual,dadosStr);}
  }
  if(!dadosStr){wrap.innerHTML='<div class="empty"><div class="ei">🏭</div><h2>Sem programação de usina</h2></div>';return;}
  const prog=JSON.parse(dadosStr);
  const itens=prog.itens||[];
  const usinaCfg=prog.usinaCfg||{prod:100,tonCarga:20,fator:1.025,horaInicio:'18:30',encarregado:'Tarciso'};
  const cfgG=prog.cfg||{BV:2.313,bvT:4,bvC:'Térmico Pequeno',bvR:'Gilberto'};
  const grupos={};
  itens.forEach(it=>{const k=it.solucao||'Outros';if(!grupos[k])grupos[k]={sol:k,ton:0};grupos[k].ton+=it.peso;});
  const massas=[];let seq=1;
  Object.values(grupos).forEach(g=>{
    const isBV=g.sol.toUpperCase()==='BV';
    const tonU=isBV?(cfgG.bvT||4):g.ton*(usinaCfg.fator||1.025);
    const cargas=isBV?1:Math.ceil(tonU/(usinaCfg.tonCarga||20));
    const tonC=cargas>0?tonU/cargas:0;
    massas.push({seq:seq++,cam:isBV?(cfgG.bvC||'Térmico Pequeno'):'Basculante',usin:mapSolU(g.sol),cargas,tonC:parseFloat(tonC.toFixed(2)),pesoT:parseFloat(tonU.toFixed(2)),equipe:isBV?(cfgG.bvR||'Gilberto'):(usinaCfg.encarregado||'–'),isBV});
  });
  if(!massas.find(m=>m.isBV)) massas.push({seq:massas.length+1,cam:cfgG.bvC||'Térmico Pequeno',usin:'BV',cargas:1,tonC:cfgG.bvT||4,pesoT:cfgG.bvT||4,equipe:cfgG.bvR||'Gilberto',isBV:true});
  massas.sort((a,b)=>a.isBV-b.isBV);
  const totalC=massas.reduce((s,m)=>s+m.cargas,0);
  const totalT=massas.reduce((s,m)=>s+m.pesoT,0);
  const prod=usinaCfg.prod||100;
  const [hI,mI]=(usinaCfg.horaInicio||'18:30').split(':').map(Number);
  const minF=hI*60+mI+Math.round((totalT/prod)*60);
  const fimStr=String(Math.floor(minF/60)%24).padStart(2,'0')+':'+String(minF%60).padStart(2,'0');
  let html=`<div class="u-head"><div><div class="u-titulo">Programação Usina</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">${fmtD(dataAtual)}</div></div>
  <div class="u-meta">
    <div class="u-mi"><div class="ul">Início</div><div class="uv">${usinaCfg.horaInicio||'18:30'}</div></div>
    <div class="u-mi"><div class="ul">Fim prev.</div><div class="uv" style="color:var(--branco)">${fimStr}</div></div>
    <div class="u-mi"><div class="ul">Total</div><div class="uv">${fmt(totalT)} t</div></div>
    <div class="u-mi"><div class="ul">Encarregado</div><div class="uv" style="font-size:14px;color:var(--branco)">${usinaCfg.encarregado||'–'}</div></div>
  </div></div>
  <div class="tw"><table class="tu"><thead><tr>
    <th>Caminhão</th><th>Usinagem</th><th>Seq.</th><th>Cargas</th><th>Peso/Carga(t)</th><th>Total(t)</th><th>Equipe</th>
  </tr></thead><tbody>`;
  massas.forEach(m=>{
    html+=`<tr><td style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600">${m.cam}</td><td style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700">${m.usin}</td><td style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#F5A623">${m.seq}º</td><td style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#93C5FD">${m.cargas}</td><td style="color:#FCA989;font-weight:700">${fmt(m.tonC)}</td><td style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#F5A623">${fmt(m.pesoT)}</td><td style="font-family:'Barlow Condensed',sans-serif;font-size:13px">${m.equipe}</td></tr>`;
  });
  html+=`<tr class="tr-total"><td colspan="2"></td><td>TOTAL</td><td style="color:#93C5FD;font-size:16px">${totalC}</td><td></td><td style="color:#F5A623;font-size:16px">${fmt(totalT)}</td><td></td></tr></tbody></table></div>`;
  wrap.innerHTML=html;
}

function mapSolU(sol){const s=(sol||'').toLowerCase();if(s.includes('16mm')||s==='ff')return'16 mm borracha';if(s.includes('25mm'))return'25 mm borracha';if(s==='gap')return'GAP';if(s==='bv')return'BV';if(s==='lsam')return'LSAM';if(s==='cd')return'CD';if(s==='ff-1')return'FF-1';if(s==='fr6')return'FR6';return sol;}
function fmt(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function n3(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:3,maximumFractionDigits:3});}
</script>
</body>
